<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Ejercicio 2</title>
  </head>
  <body>
    <h1 id="privacidad">Privacidad</h1>
    <main>
      <!-- datos vinculados -->
      <section id="datosVinculados">
        <img
          src="./img/icon-identidad.svg"
          alt="icon-identidad"
          class="imgIdentidad"
        />
        <p class="parrafoIdentidad">Datos vinculados a tí</p>
        <p>
          Los siguientes datos pueden ser recolectados y vinculados a tu
          identidad:
        </p>
        <div class="contenedor-info">
          <p>
            <img
              src="./img/icon-info.svg"
              alt="icon-info"
              class="imgInfo"
            />Información de contacto
          </p>
          <p>
            <img
              src="./img/icon-identificadores.svg"
              alt="icon-identificadores"
              class="imgIdentificadores"
            />Identificadores
          </p>
        </div>
      </section>
      <!-- Datos no vinculados -->
      <section>
        <img
          src="./img/icon-no-identidad.svg"
          alt="icon-no-identidad"
          class="imgIdentidad"
        />
        <p class="parrafoIdentidad">Datos no vinculados a tí</p>
        <p>
          Los siguientes datos pueden ser recolectados y vinculados a tu
          identidad:
        </p>
        <div class="contenedor-info">
          <p>
            <img
              src="./img/icon-diagnostico.svg"
              alt="icon-diagnostico"
              class="imgInfo imgDiag"
            />Diagnóstico
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
